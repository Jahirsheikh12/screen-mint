name: Release ScreenMint Builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to create or update
        required: true
        type: string
      release_name:
        description: Release title
        required: true
        type: string
      release_notes:
        description: Optional release notes
        required: false
        type: string
      make_latest:
        description: Mark this release as the latest release
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  validate-release:
    name: Validate release metadata
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.release_meta.outputs.tag_name }}
      release_name: ${{ steps.release_meta.outputs.release_name }}
      release_notes: ${{ steps.release_meta.outputs.release_notes }}
      make_latest: ${{ steps.release_meta.outputs.make_latest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
            RELEASE_NAME="${{ github.event.inputs.release_name }}"
            RELEASE_NOTES="${{ github.event.inputs.release_notes }}"
            MAKE_LATEST="${{ github.event.inputs.make_latest }}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
            RELEASE_NAME="ScreenMint ${GITHUB_REF_NAME}"
            RELEASE_NOTES=""
            MAKE_LATEST="true"
          fi

          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "${RELEASE_NOTES}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "make_latest=${MAKE_LATEST}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          ACTUAL_TAG="${{ steps.release_meta.outputs.tag_name }}"

          if [ "${ACTUAL_TAG}" != "${EXPECTED_TAG}" ]; then
            echo "Release tag ${ACTUAL_TAG} does not match package.json version ${PACKAGE_VERSION}."
            exit 1
          fi

  build-macos-x64:
    name: Build macOS x64
    needs: validate-release
    runs-on: macos-15-intel
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install app dependencies
        run: npx electron-builder install-app-deps

      - name: Build native macOS helpers
        run: npm run build:native-helpers

      - name: Build macOS x64
        run: |
          npx tsc
          npx vite build
          npx electron-builder --mac dmg --x64 --publish never
          mv release/ScreenMint.dmg release/ScreenMint-x64.dmg

      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: release/ScreenMint-x64.dmg
          if-no-files-found: error

  build-macos-arm64:
    name: Build macOS arm64
    needs: validate-release
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install app dependencies
        run: npx electron-builder install-app-deps

      - name: Build native macOS helpers
        run: npm run build:native-helpers

      - name: Build macOS arm64
        run: |
          npx tsc
          npx vite build
          npx electron-builder --mac dmg --arm64 --publish never
          mv release/ScreenMint.dmg release/ScreenMint-arm64.dmg

      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: release/ScreenMint-arm64.dmg
          if-no-files-found: error

  build-windows-x64:
    name: Build Windows x64
    needs: validate-release
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install app dependencies
        run: npx electron-builder install-app-deps

      - name: Build Windows x64
        shell: pwsh
        run: |
          npm run build:wgc-capture
          npm run build:cursor-monitor
          npx tsc
          npx vite build
          npx electron-builder --win nsis --x64 --publish never
          Rename-Item -Path release/ScreenMint.exe -NewName ScreenMint-windows-x64.exe

      - name: Upload Windows x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: release/ScreenMint-windows-x64.exe
          if-no-files-found: error

  build-linux-x64:
    name: Build Linux x64
    needs: validate-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install app dependencies
        run: npx electron-builder install-app-deps

      - name: Build Linux x64
        run: |
          npx tsc
          npx vite build
          npx electron-builder --linux AppImage --x64 --publish never
          mv release/ScreenMint.AppImage release/ScreenMint-linux-x64.AppImage

      - name: Upload Linux x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: release/ScreenMint-linux-x64.AppImage
          if-no-files-found: error

  publish-release:
    name: Publish release
    needs:
      - validate-release
      - build-macos-x64
      - build-macos-arm64
      - build-windows-x64
      - build-linux-x64
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-x64
          path: release-assets

      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: release-assets

      - name: Download Windows x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-x64
          path: release-assets

      - name: Download Linux x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-x64
          path: release-assets

      - name: Create or update release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.validate-release.outputs.tag_name }}
          name: ${{ needs.validate-release.outputs.release_name }}
          body: ${{ needs.validate-release.outputs.release_notes }}
          makeLatest: ${{ needs.validate-release.outputs.make_latest }}
          allowUpdates: true
          replacesArtifacts: true
          artifactErrorsFailBuild: true
          generateReleaseNotes: true
          artifacts: |
            release-assets/ScreenMint-arm64.dmg
            release-assets/ScreenMint-x64.dmg
            release-assets/ScreenMint-windows-x64.exe
            release-assets/ScreenMint-linux-x64.AppImage
